name: Validate Theme

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.15.0
      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils ripgrep
      - name: Record toolchain
        run: |
          typst --version
          pdftoppm -v
          python3 --version
      - name: Validate package, examples, and tests
        run: make validate
